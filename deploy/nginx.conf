server {
    listen 80;
    server_name kalash.576322.xyz;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://unix:/home/andrey_kalashnikov_am/website/app.sock;
    }

    location /static/ {
        alias /home/andrey_kalashnikov_am/website/static/;
    }
}